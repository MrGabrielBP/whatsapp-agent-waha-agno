services:
  waha:
    container_name: waha
    image: devlikeapro/waha:latest
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - waha_data:/app/.sessions
    environment:
      - WAHA_LOG_FORMAT=JSON
      - WHATSAPP_HOOK_URL=http://api:8000/waha/webhook
      - WHATSAPP_HOOK_EVENTS=message,session.status
      - WHATSAPP_HOOK_RETRIES_ATTEMPTS=4
      - WHATSAPP_HOOK_RETRIES_DELAY_SECONDS=3
    env_file:
      - .env

  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/workspace:cached
    command: tail -f /dev/null
    ports:
      - '8000:8000'
    environment:
      WAHA_API_URL: http://waha:3000/api
      WAHA_SESSION_NAME: default
  
  rabbitmq:
    image: rabbitmq:4.1.3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      # Porta para comunicação AMQP (protocolo principal)
      - "5672:5672"
      # Porta para a Interface de Gerenciamento Web
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      # Persistência de dados (opcional, mas recomendado)
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  waha_data:
  rabbitmq_data:
  redis_data: